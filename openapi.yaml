  title: Catalog of services
  termsOfService: https://swissmedical.com.ar/terms/
  contact:
    name: Contact our support
    email: contact@swissmedical.com.ar
    url: http://swissmedical.com.ar/contact
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: "data:image/png;base64,"
    altText: Logo
servers:
