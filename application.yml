spring:
  web: 
    cors:
      allowed-origins: http://localhost:3000
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type
      allow-credentials: true
  devtools: 
    restart: 
      enabled: true
    livereload:
      enabled: true
  application:
    name: core-template
  cloud:
    discovery:
      client:
        composite-indicator:
          enabled: false

  data:
    jpa:
      open-in-view: false
      repositories:
        enabled: false

  jpa:
    open-in-view: false

  datasource:
    url: ${DB_URL}
    driver-class-name: ${DB_DRIVER_CLASS}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 15
      maximum-pool-size: 50
      pool-name: DS0HikariCP
      connection-timeout: 30000
      connection-test-query: select 1
      max-lifetime: 600000
      idle-timeout: 120000
      data-source-properties: { cachePrepStmts: true, prepStmtCacheSize: 250, prepStmtCacheSqlLimit: 2048, useServerPrepStmts: true }
  # sql:
  #   init:
  #     platform: ${DB_PLATFORM}
  #     mode: always

management:
  metrics:
    tags:
      application: core-template
  endpoint:
    health: 
      show-details: always
  health: 
    defaults:
      enabled: false
    db:
      enabled: true
    diskspace:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    defaultModelsExpandDepth: -1
  paths-to-exclude: /swagger-resources/**
  api-docs:
    path: /api/docs
logging:
  pattern:
    level: "%5p [trace=%X{traceId}]"